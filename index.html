<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Travel Recommendation</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #1e1e1e;
            padding: 10px 20px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin-right: 20px;
        }

        .nav-links a:hover {
            color: #00bcd4;
        }

        /* SEARCH BOX */
        .search-box {
            display: flex;
            align-items: center;
        }

        .search-box input {
            padding: 5px;
            margin-right: 5px;
        }

        .search-box button {
            margin-left: 5px;
            padding: 5px 10px;
            cursor: pointer;
        }

    </style>
</head>

<body>

<!-- NAVIGATION BAR -->
<div class="navbar">

    <!-- Left side links -->
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About Us</a>
        <a href="contact.html">Contact Us</a>
    </div>

    <!-- Search box + buttons -->
    <div class="search-box">
        <input type="text" placeholder="Search destinations...">
        <button type="button">Search</button>
        <button type="button">Clear</button>
    </div>

</div>

<!-- PAGE CONTENT -->
<h1 style="text-align:center; margin-top:50px;">
    Welcome to Travel Recommendation Website
</h1>

</body>
</html>
